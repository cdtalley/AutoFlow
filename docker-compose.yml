version: "3.9"
services:
  autoflow:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    network_mode: host

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: autoflow
      POSTGRES_USER: autoflow
      POSTGRES_PASSWORD: autoflow
    ports:
      # 5433 avoids clash with a local PostgreSQL install bound to 5432 (common on Windows).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
