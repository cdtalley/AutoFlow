name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: autoflow
          POSTGRES_PASSWORD: autoflow
          POSTGRES_DB: autoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autoflow -d autoflow"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10
    env:
      # CI services listen on localhost; differs from docker-compose host port 5433 for local dev.
      DATABASE_URL: postgresql+asyncpg://autoflow:autoflow@127.0.0.1:5432/autoflow
      SYNC_DATABASE_URL: postgresql://autoflow:autoflow@127.0.0.1:5432/autoflow
      REDIS_URL: redis://127.0.0.1:6379/0
      OLLAMA_BASE_URL: http://127.0.0.1:11434
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
